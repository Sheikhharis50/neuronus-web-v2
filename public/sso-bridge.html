<!DOCTYPE html>
<html>
<head>
    <title>SSO Bridge</title>
</head>
<body>
<script>
    const normalizeOrigin = (o) => o.replace(/\/$/, "");

    const TRUSTED_ORIGINS = [
        "http://localhost:5174",
        "http://localhost:5173",
        "https://neurorsa.xyz",
        "https://neuropassword.com",
        "https://storage.neurodrive.me",
        "https://mailing.neuromail.cloud",
    ].map(normalizeOrigin);

    // ─────────────────────────────────────────────────────────
    // BroadcastChannel — same origin (neuronus.net) messaging
    // Hub tab → this iframe → parent app
    // ─────────────────────────────────────────────────────────
    const bc = new BroadcastChannel("auth_sync");

    bc.onmessage = (event) => {
        // Hub user logged out → tell all parent apps
        if (event.data.type === "SESSION_TERMINATED") {
            localStorage.removeItem("access_token");
            localStorage.removeItem("crypto_data");
            localStorage.removeItem("encryption-key");

            window.parent.postMessage({
                type: "AUTH_DATA_RESPONSE",
                payload: { status: "LOGOUT" }
            }, "*");
        }

        // Hub user just logged in while app was already open → refresh token
        if (event.data.type === "SESSION_UPDATED") {
            window.parent.postMessage({
                type: "AUTH_DATA_RESPONSE",
                payload: { status: "RELOAD_TOKEN" }
            }, "*");
        }
    };

    // ─────────────────────────────────────────────────────────
    // postMessage — cross origin messaging
    // Parent app (neuropassword.com etc.) → this iframe
    // ─────────────────────────────────────────────────────────
    window.addEventListener("message", async (event) => {
        const incomingOrigin = normalizeOrigin(event.origin);
        if (!TRUSTED_ORIGINS.includes(incomingOrigin)) return;

        const appLockKey = `lock_${incomingOrigin}`;

        // ── REQUEST_AUTH_DATA ──────────────────────────────────
        // Parent asking: "do I have a valid session?"
        if (event.data.type === "REQUEST_AUTH_DATA") {
            const isAppLocked = localStorage.getItem(appLockKey) === "true";
            const accessToken = localStorage.getItem("access_token");

            // App is locked — tell parent to show unlock screen
            if (isAppLocked) {
                event.source.postMessage({
                    type: "AUTH_DATA_RESPONSE",
                    payload: {
                        status: "LOCKED",
                        hasSession: !!accessToken
                    }
                }, event.origin);
                return;
            }

            // Token exists in this iframe's localStorage partition
            if (accessToken) {
                event.source.postMessage({
                    type: "AUTH_DATA_RESPONSE",
                    payload: {
                        status: "AUTHORIZED",
                        accessToken,
                        cryptoData: localStorage.getItem("crypto_data"),
                        encryptionKey: localStorage.getItem("encryption-key"),
                        hasHubAccount: true
                    }
                }, event.origin);
                return;
            }

            // No token in localStorage (storage partitioned) —
            // try HttpOnly cookie which IS shared across iframe contexts
            const result = await tryRefreshToken();

            if (result.status === "AUTHORIZED") {
                // Save into this partition for future requests this session
                localStorage.setItem("access_token", result.accessToken);
            }

            // Always include hasHubAccount so AuthContext can show correct UI
            event.source.postMessage({
                type: "AUTH_DATA_RESPONSE",
                payload: {
                    ...result,
                    hasHubAccount: result.status === "AUTHORIZED"
                }
            }, event.origin);
            return;
        }

        // ── REFRESH_TOKEN_REQUEST ──────────────────────────────
        // Parent asking: "my token expired, get me a new one"
        if (event.data.type === "REFRESH_TOKEN_REQUEST") {
            const result = await tryRefreshToken();

            if (result.status === "AUTHORIZED") {
                localStorage.setItem("access_token", result.accessToken);
            }

            event.source.postMessage({
                type: result.status === "AUTHORIZED" ? "TOKEN_REFRESHED" : "SESSION_EXPIRED",
                payload: result.status === "AUTHORIZED"
                    ? { accessToken: result.accessToken }
                    : {}
            }, event.origin);
            return;
        }

        // ── SET_LOCK ───────────────────────────────────────────
        // Parent asking: "lock this app"
        if (event.data.type === "SET_LOCK") {
            localStorage.setItem(appLockKey, "true");
            event.source.postMessage({
                type: "AUTH_DATA_RESPONSE",
                payload: {
                    status: "LOCKED",
                    hasSession: !!localStorage.getItem("access_token")
                }
            }, event.origin);
            return;
        }

        // ── UNLOCK_APP ─────────────────────────────────────────
        // Parent asking: "user entered master password, unlock"
        if (event.data.type === "UNLOCK_APP") {
            localStorage.removeItem(appLockKey);
            const accessToken = localStorage.getItem("access_token");

            // If token gone (long lock period), try cookie refresh
            if (!accessToken) {
                const result = await tryRefreshToken();
                if (result.status === "AUTHORIZED") {
                    localStorage.setItem("access_token", result.accessToken);
                }
                event.source.postMessage({
                    type: "AUTH_DATA_RESPONSE",
                    payload: {
                        ...result,
                        hasHubAccount: result.status === "AUTHORIZED"
                    }
                }, event.origin);
                return;
            }

            event.source.postMessage({
                type: "AUTH_DATA_RESPONSE",
                payload: {
                    status: "AUTHORIZED",
                    accessToken,
                    cryptoData: localStorage.getItem("crypto_data"),
                    encryptionKey: localStorage.getItem("encryption-key"),
                    hasHubAccount: true
                }
            }, event.origin);
            return;
        }
    });

    // ─────────────────────────────────────────────────────────
    // tryRefreshToken
    // Uses HttpOnly cookie — NOT affected by storage partitioning
    // This is the key that bypasses Chrome's storage partitioning
    // ─────────────────────────────────────────────────────────
    async function tryRefreshToken() {
        try {
            const response = await fetch(
                "https://api.prod.auth.neuronus.net/api/auth/token/refresh/",
                {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    credentials: "include" // sends HttpOnly cookie ← not partitioned ✅
                }
            );

            if (response.ok) {
                const data = await response.json();
                return {
                    status: "AUTHORIZED",
                    accessToken: data.access,
                    cryptoData: localStorage.getItem("crypto_data") || null,
                    encryptionKey: localStorage.getItem("encryption-key") || null
                };
            }

            return { status: "NO_SESSION", hasHubAccount: false };
        } catch {
            return { status: "NO_SESSION", hasHubAccount: false };
        }
    }
</script>
</body>
</html>
