<!DOCTYPE html>
<html>
<head><title>SSO Bridge</title></head>
<body>
<script>
    const normalizeOrigin = (o) => o.replace(/\/$/, "");

    const AUTH_API_BASE = "https://api.prod.auth.neuronus.net/api";

    // Subdomain apps that embed this bridge (neuronus.net origin)
    const TRUSTED_ORIGINS = [
        "http://localhost:5173",
        "http://localhost:5174",
        "http://localhost:3000",
        "https://neuronus.net",
        "https://www.neuronus.net",
        "https://passwordmanager.neuronus.net",
        "https://neurorsa.neuronus.net",
        "https://drive.neuronus.net",
        "https://mail.neuronus.net",
        "https://ghosttransfer.neuronus.net",
        "https://resonance.neuronus.net",
    ].map(normalizeOrigin);

    // Shared across neuronus.net tabs + every embedded bridge iframe
    const bc = new BroadcastChannel("auth_sync");

    const HUB_AUTH_KEYS = new Set([
        "access_token",
        "crypto_data",
        "encryption-key",
        "is_2fa",
    ]);

    function clearHubSession() {
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (!key) continue;
            if (HUB_AUTH_KEYS.has(key) || key.startsWith("lock_")) {
                keysToRemove.push(key);
            }
        }
        keysToRemove.forEach((key) => localStorage.removeItem(key));
    }

    function notifyParentLogout() {
        if (window.parent === window) return;
        window.parent.postMessage({
            type: "AUTH_DATA_RESPONSE",
            payload: { status: "LOGOUT" },
        }, "*");
    }

    /** Hub-first logout: clear hub storage, fan out to all tabs/apps (client-side only). */
    function terminateHubSession({ broadcast = true, notifyParent = true } = {}) {
        clearHubSession();
        if (broadcast) {
            bc.postMessage({ type: "SESSION_TERMINATED" });
        }
        if (notifyParent) {
            notifyParentLogout();
        }
    }

    bc.onmessage = (e) => {
        if (e.data.type === "SESSION_TERMINATED") {
            clearHubSession();
            notifyParentLogout();
        }
        if (e.data.type === "SESSION_UPDATED") {
            const accessToken = localStorage.getItem("access_token");
            if (accessToken) {
                window.parent.postMessage({
                    type: "AUTH_DATA_RESPONSE",
                    payload: {
                        status: "AUTHORIZED",
                        accessToken,
                        cryptoData: localStorage.getItem("crypto_data"),
                        encryptionKey: localStorage.getItem("encryption-key"),
                        hasHubAccount: true,
                    },
                }, "*");
            }
        }
    };

    window.addEventListener("message", async (event) => {
        const incomingOrigin = normalizeOrigin(event.origin);
        if (!TRUSTED_ORIGINS.includes(incomingOrigin)) return;

        const appLockKey = `lock_${incomingOrigin}`;

        // ── TERMINATE_SESSION (logout from any subdomain → hub → all apps) ──
        if (event.data.type === "TERMINATE_SESSION") {
            terminateHubSession({ broadcast: true, notifyParent: false });
            event.source.postMessage({
                type: "AUTH_DATA_RESPONSE",
                payload: { status: "LOGOUT" },
            }, event.origin);
            return;
        }

        // ── REQUEST_AUTH_DATA ──────────────────────────────────
        if (event.data.type === "REQUEST_AUTH_DATA") {
            const isAppLocked = localStorage.getItem(appLockKey) === "true";
            const accessToken = localStorage.getItem("access_token");

            if (isAppLocked) {
                event.source.postMessage({
                    type: "AUTH_DATA_RESPONSE",
                    payload: { status: "LOCKED", hasSession: !!accessToken },
                }, event.origin);
                return;
            }

            if (accessToken) {
                event.source.postMessage({
                    type: "AUTH_DATA_RESPONSE",
                    payload: {
                        status: "AUTHORIZED",
                        accessToken,
                        cryptoData: localStorage.getItem("crypto_data"),
                        encryptionKey: localStorage.getItem("encryption-key"),
                        hasHubAccount: true,
                    },
                }, event.origin);
                return;
            }

            const result = await tryRefreshToken();
            if (result.status === "AUTHORIZED") {
                localStorage.setItem("access_token", result.accessToken);
            }
            event.source.postMessage({
                type: "AUTH_DATA_RESPONSE",
                payload: { ...result, hasHubAccount: result.status === "AUTHORIZED" },
            }, event.origin);
            return;
        }

        // ── SET_LOCK ───────────────────────────────────────────
        if (event.data.type === "SET_LOCK") {
            localStorage.setItem(appLockKey, "true");
            event.source.postMessage({
                type: "AUTH_DATA_RESPONSE",
                payload: { status: "LOCKED", hasSession: !!localStorage.getItem("access_token") },
            }, event.origin);
            return;
        }

        // ── UNLOCK_APP ─────────────────────────────────────────
        if (event.data.type === "UNLOCK_APP") {
            localStorage.removeItem(appLockKey);
            const accessToken = localStorage.getItem("access_token");

            if (!accessToken) {
                const result = await tryRefreshToken();
                if (result.status === "AUTHORIZED") {
                    localStorage.setItem("access_token", result.accessToken);
                }
                event.source.postMessage({
                    type: "AUTH_DATA_RESPONSE",
                    payload: { ...result, hasHubAccount: result.status === "AUTHORIZED" },
                }, event.origin);
                return;
            }

            event.source.postMessage({
                type: "AUTH_DATA_RESPONSE",
                payload: {
                    status: "AUTHORIZED",
                    accessToken,
                    cryptoData: localStorage.getItem("crypto_data"),
                    encryptionKey: localStorage.getItem("encryption-key"),
                    hasHubAccount: true,
                },
            }, event.origin);
            return;
        }

        // ── REFRESH_TOKEN_REQUEST ──────────────────────────────
        if (event.data.type === "REFRESH_TOKEN_REQUEST") {
            const result = await tryRefreshToken();
            if (result.status === "AUTHORIZED") {
                localStorage.setItem("access_token", result.accessToken);
            }
            event.source.postMessage({
                type: result.status === "AUTHORIZED" ? "TOKEN_REFRESHED" : "SESSION_EXPIRED",
                payload: result.status === "AUTHORIZED" ? { accessToken: result.accessToken } : {},
            }, event.origin);
            return;
        }
    });

    async function tryRefreshToken() {
        try {
            const response = await fetch(`${AUTH_API_BASE}/auth/token/refresh/`, {
                method: "POST",
                headers: { "Accept": "application/json", "Content-Type": "application/json" },
                credentials: "include",
            });
            if (response.ok) {
                const data = await response.json();
                return {
                    status: "AUTHORIZED",
                    accessToken: data.access,
                    cryptoData: localStorage.getItem("crypto_data") || null,
                    encryptionKey: localStorage.getItem("encryption-key") || null,
                };
            }
            return { status: "NO_SESSION" };
        } catch {
            return { status: "NO_SESSION" };
        }
    }
</script>
</body>
</html>
